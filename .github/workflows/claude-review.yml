name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read
  issues: read
  actions: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude PR Review
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Review this pull request. Focus on correctness, security, error handling, and Harper-specific patterns (resource class shape, schema directives, transactions, plugin config). Leave inline comments where appropriate; keep the summary tight.
            REPO: ${{ github.repository }}
            PR: #${{ github.event.pull_request.number }}
          claude_args: |
            {
              "model": "claude-sonnet-4-6",
              "max_tokens": 8000
            }
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
